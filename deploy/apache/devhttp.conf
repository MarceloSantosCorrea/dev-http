<VirtualHost *:80>
  ServerName __SERVER_NAME__
  ServerAdmin webmaster@localhost

  ProxyPreserveHost On
  ProxyRequests Off
  ProxyAddHeaders On
  ProxyTimeout 60
  AllowEncodedSlashes NoDecode

  RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
  RequestHeader set X-Forwarded-Port expr=%{SERVER_PORT}

  ProxyPass /api/ http://127.0.0.1:4000/
  ProxyPassReverse /api/ http://127.0.0.1:4000/
  ProxyPass /api http://127.0.0.1:4000/
  ProxyPassReverse /api http://127.0.0.1:4000/

  ProxyPass / http://127.0.0.1:3000/
  ProxyPassReverse / http://127.0.0.1:3000/

  ErrorLog ${APACHE_LOG_DIR}/devhttp-error.log
  CustomLog ${APACHE_LOG_DIR}/devhttp-access.log combined
</VirtualHost>
